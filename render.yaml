services:
  - type: web
    name: educase
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    region: ohio
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: LIBREOFFICE_PATH
        value: soffice
      - key: SUPABASE_STORAGE_BUCKET
        value: certificados

      # ─── Configurar manualmente em: dashboard.render.com → Environment ────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
